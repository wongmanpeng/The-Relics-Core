<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文明遗迹：觉醒 - 终极版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #030803;
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>
        let HISTORY = [];
        let CURRENT_COUNTS = [0, 0, 0, 0];
        let WOODS = [];
        let BOLTS = [];
        let IS_GAMEOVER = false;
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];
        const RUNES = ['ᚠ', 'ᚢ', 'ᚦ', 'ᚨ'];

        const AudioSynth = {
            ctx: null,
            play(freq, type = 'sine', dur = 0.1) {
                try {
                    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch (e) { }
            }
        };

        const config = {
            type: Phaser.AUTO,
            width: 750,
            height: 1334,
            parent: 'game-container',
            backgroundColor: '#050a05',
            physics: { default: 'matter', matter: { gravity: { y: 2.8 }, debug: false } },
            scene: { create },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const scene = this;

            // --- 1. 纹理生成 ---
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            // 石板
            g.fillStyle(0x3d3d3d).fillRect(0, 0, 500, 80);
            g.lineStyle(4, 0x1a1a1a).strokeRect(2, 2, 496, 76);
            g.generateTexture('stone_brick', 500, 80);
            g.clear();
            // 成功窗口背景
            g.fillStyle(0x1a1a1a, 0.95).fillRoundedRect(0, 0, 500, 300, 20);
            g.lineStyle(6, 0xd4af37).strokeRoundedRect(3, 3, 494, 294, 20);
            g.generateTexture('modal_bg', 500, 300);
            g.clear();
            // 宝石
            g.fillStyle(0xffffff).fillPoints([{ x: 25, y: 0 }, { x: 50, y: 15 }, { x: 50, y: 35 }, { x: 25, y: 50 }, { x: 0, y: 35 }, { x: 0, y: 15 }], true);
            g.generateTexture('gem', 50, 50);

            // --- 2. 界面布局 ---
            this.texts = [];
            this.bowlContainers = [];
            COLORS.forEach((color, i) => {
                const x = 120 + i * 170;
                const container = this.add.container(x, 150);
                const glow = this.add.circle(0, 0, 65, color, 0.2);
                const txt = this.add.text(0, -10, '0', { fontSize: '70px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
                container.add([glow, txt]);
                this.texts.push(txt);
                this.bowlContainers.push(container);
            });

            // 物理关卡
            const layout = [
                { x: 230, y: 550, angle: -35, w: 320, c: 0 },
                { x: 520, y: 550, angle: 35, w: 320, c: 0 },
                { x: 375, y: 780, angle: 0, w: 520, c: 2 },
                { x: 180, y: 1050, angle: 90, w: 380, c: 1 },
                { x: 570, y: 1050, angle: 90, w: 380, c: 3 }
            ];

            layout.forEach((data, i) => {
                let stone = this.matter.add.sprite(data.x, data.y, 'stone_brick');
                stone.setDisplaySize(data.w, 80).setStatic(true).setAngle(data.angle);
                WOODS.push(stone);

                let glow = this.add.circle(data.x, data.y, 65, COLORS[data.c], 0.2);
                let gem = this.add.image(data.x, data.y, 'gem').setTint(COLORS[data.c]).setScale(1.2).setInteractive();

                gem.on('pointerdown', () => {
                    if (IS_GAMEOVER) return;
                    saveSnapshot();
                    AudioSynth.play(800 + data.c * 100);
                    gem.setVisible(false).disableInteractive();
                    glow.setVisible(false);

                    CURRENT_COUNTS[data.c]++;
                    this.texts[data.c].setText(CURRENT_COUNTS[data.c]);
                    stone.setStatic(false);

                    checkWin(scene); // 核心：检查是否胜利
                });
                BOLTS.push({ gem, glow });
            });

            // --- 3. 成功弹窗系统 ---
            this.winModal = this.add.container(width / 2, height / 2).setDepth(100).setVisible(false).setScale(0);
            const modalBg = this.add.image(0, 0, 'modal_bg');
            const winTitle = this.add.text(0, -50, '你成功了！', { fontSize: '50px', color: '#d4af37', fontStyle: 'bold' }).setOrigin(0.5);
            const winSub = this.add.text(0, 30, '古文明守护者已觉醒', { fontSize: '28px', color: '#ffffff', alpha: 0.8 }).setOrigin(0.5);

            // 重启按钮
            const restartBtn = this.add.rectangle(0, 100, 200, 60, 0xd4af37).setInteractive();
            const restartTxt = this.add.text(0, 100, '再玩一次', { fontSize: '24px', color: '#000', fontStyle: 'bold' }).setOrigin(0.5);

            this.winModal.add([modalBg, winTitle, winSub, restartBtn, restartTxt]);

            restartBtn.on('pointerdown', () => { location.reload(); });

            // 撤回按钮
            const undoBtn = this.add.container(width / 2, height - 150);
            const uBtn = this.add.circle(0, 0, 80, 0x222).setStrokeStyle(4, 0xd4af37).setInteractive();
            undoBtn.add([uBtn, this.add.text(0, 0, 'UNDO', { fontSize: '32px', color: '#d4af37' }).setOrigin(0.5)]);

            uBtn.on('pointerdown', () => {
                if (HISTORY.length === 0 || IS_GAMEOVER) return;
                const last = HISTORY.pop();
                CURRENT_COUNTS = [...last.c];
                CURRENT_COUNTS.forEach((n, i) => this.texts[i].setText(n));
                last.b.forEach((b, i) => {
                    BOLTS[i].gem.setVisible(b.v);
                    BOLTS[i].glow.setVisible(b.v);
                    if (b.v) BOLTS[i].gem.setInteractive();
                });
                last.w.forEach((w, i) => {
                    WOODS[i].setStatic(true).setPosition(w.x, w.y).setAngle(w.a).setVelocity(0, 0).setStatic(w.s);
                });
            });
        }

        function checkWin(scene) {
            // 检查是否所有宝石都隐藏了
            const allCollected = BOLTS.every(b => !b.gem.visible);
            if (allCollected) {
                IS_GAMEOVER = true;
                scene.time.delayedCall(1000, () => {
                    scene.winModal.setVisible(true);
                    scene.tweens.add({
                        targets: scene.winModal,
                        scale: 1,
                        duration: 500,
                        ease: 'Back.easeOut'
                    });
                    AudioSynth.play(1200, 'sine', 0.5); // 胜利音效
                });
            }
        }

        function saveSnapshot() {
            HISTORY.push({
                c: [...CURRENT_COUNTS],
                w: WOODS.map(s => ({ x: s.x, y: s.y, a: s.angle, s: s.isStatic() })),
                b: BOLTS.map(b => ({ v: b.gem.visible }))
            });
        }
    </script>
</body>

</html>
