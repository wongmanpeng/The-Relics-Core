<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>遗迹核心：色彩觉醒</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #050a05;
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>
        let HISTORY = [];
        let CURRENT_COUNTS = [0, 0, 0, 0];
        let WOODS = [];
        let BOLTS = [];
        let IS_GAMEOVER = false;
        // 严格对应的颜色阵列：青色(0)、绿色(1)、橙色(2)、紫色(3)
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];

        const AudioSynth = {
            ctx: null,
            play(freq, type = 'sine', dur = 0.1) {
                try {
                    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch (e) { }
            }
        };

        const config = {
            type: Phaser.AUTO,
            width: 750,
            height: 1334,
            parent: 'game-container',
            backgroundColor: '#020502',
            physics: { default: 'matter', matter: { gravity: { y: 2.8 }, debug: false } },
            scene: { create },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const scene = this;

            // --- 1. 纹理绘制 ---
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            // 石板
            g.fillStyle(0x3d453d).fillRect(0, 0, 500, 80);
            g.lineStyle(4, 0x1a201a).strokeRect(2, 2, 496, 76);
            g.generateTexture('stone', 500, 80);
            g.clear();
            // 水晶
            g.fillStyle(0xffffff).fillPoints([{ x: 25, y: 0 }, { x: 50, y: 15 }, { x: 50, y: 35 }, { x: 25, y: 50 }, { x: 0, y: 35 }, { x: 0, y: 15 }], true);
            g.generateTexture('crystal', 50, 50);
            g.clear();
            // 弹窗
            g.fillStyle(0x111, 0.95).fillRoundedRect(0, 0, 550, 350, 30);
            g.lineStyle(5, 0xd4af37).strokeRoundedRect(4, 4, 542, 342, 30);
            g.generateTexture('modal', 550, 350);

            // --- 2. 顶部：带颜色对应的仪式碗 ---
            this.texts = [];
            this.bowlGlows = []; // 存储光晕以便做动画

            COLORS.forEach((color, i) => {
                const x = 125 + i * 165;
                const y = 160;

                // 碗底座
                this.add.circle(x, y, 65, 0x1a1a1a).setStrokeStyle(3, 0x333);

                // --- 核心优化：对应的颜色光晕 ---
                const glow = this.add.circle(x, y, 55, color, 0.3).setDepth(1);
                this.bowlGlows.push(glow);

                // 呼吸灯效果
                this.tweens.add({ targets: glow, alpha: 0.1, scale: 0.9, duration: 2000, yoyo: true, repeat: -1 });

                // 计数文字
                const t = this.add.text(x, y, '0', {
                    fontSize: '65px', color: '#ffffff', fontStyle: 'bold'
                }).setOrigin(0.5).setDepth(2).setShadow(2, 2, '#000', 2);

                this.texts.push(t);
            });

            // --- 3. 物理关卡 ---
            const layout = [
                { x: 230, y: 550, angle: -35, w: 320, c: 0 }, // 青
                { x: 520, y: 550, angle: 35, w: 320, c: 0 },  // 青
                { x: 375, y: 780, angle: 0, w: 520, c: 2 },   // 橙
                { x: 180, y: 1050, angle: 90, w: 380, c: 1 },  // 绿
                { x: 570, y: 1050, angle: 90, w: 380, c: 3 }   // 紫
            ];

            layout.forEach((data, i) => {
                let stone = this.matter.add.sprite(data.x, data.y, 'stone').setDisplaySize(data.w, 85).setStatic(true).setAngle(data.angle);
                let glow = this.add.circle(data.x, data.y, 65, COLORS[data.c], 0.25);
                let crys = this.add.image(data.x, data.y, 'crystal').setTint(COLORS[data.c]).setScale(1.3).setInteractive();

                crys.on('pointerdown', () => {
                    if (IS_GAMEOVER) return;
                    saveSnapshot();
                    AudioSynth.play(500 + data.c * 150);

                    crys.setVisible(false).disableInteractive();
                    glow.setVisible(false);
                    stone.setStatic(false); // 木头掉落

                    // 更新计数
                    CURRENT_COUNTS[data.c]++;
                    this.texts[data.c].setText(CURRENT_COUNTS[data.c]);

                    // --- 核心优化：碗的颜色反馈动画 ---
                    const targetGlow = this.bowlGlows[data.c];
                    scene.tweens.add({
                        targets: targetGlow,
                        scale: 1.5,
                        alpha: 0.6,
                        duration: 150,
                        yoyo: true,
                        ease: 'Quad.easeOut'
                    });

                    checkWin(scene);
                });
                WOODS.push(stone);
                BOLTS.push({ crys, glow });
            });

            // --- 4. 底部 UNDO ---
            const uCircle = this.add.circle(width / 2, height - 120, 75, 0x1a1a1a).setStrokeStyle(4, 0xd4af37).setInteractive();
            this.add.text(width / 2, height - 120, 'UNDO', { fontSize: '30px', color: '#d4af37' }).setOrigin(0.5);

            uCircle.on('pointerdown', () => {
                if (HISTORY.length === 0 || IS_GAMEOVER) return;
                const last = HISTORY.pop();
                CURRENT_COUNTS = [...last.c];
                CURRENT_COUNTS.forEach((n, i) => this.texts[i].setText(n));
                last.b.forEach((b, i) => {
                    BOLTS[i].crys.setVisible(b.v);
                    BOLTS[i].glow.setVisible(b.v);
                    if (b.v) BOLTS[i].crys.setInteractive();
                });
                last.w.forEach((w, i) => {
                    WOODS[i].setStatic(true).setPosition(w.x, w.y).setAngle(w.a).setVelocity(0, 0).setStatic(w.s);
                });
            });

            // --- 5. 成功弹窗 ---
            this.winModal = this.add.container(width / 2, height / 2).setDepth(100).setVisible(false).setScale(0);
            this.winModal.add([
                this.add.image(0, 0, 'modal'),
                this.add.text(0, -50, '能量已觉醒', { fontSize: '55px', color: '#d4af37', fontStyle: 'bold' }).setOrigin(0.5),
                this.add.text(0, 20, '你成功引导了古老的遗迹', { fontSize: '28px', color: '#fff', alpha: 0.7 }).setOrigin(0.5),
                this.add.rectangle(0, 100, 240, 70, 0xd4af37).setInteractive().on('pointerdown', () => location.reload()),
                this.add.text(0, 100, '再玩一次', { fontSize: '30px', color: '#000', fontStyle: 'bold' }).setOrigin(0.5)
            ]);
        }

        function checkWin(scene) {
            if (BOLTS.every(b => !b.crys.visible)) {
                IS_GAMEOVER = true;
                scene.time.delayedCall(1000, () => {
                    scene.winModal.setVisible(true);
                    scene.tweens.add({ targets: scene.winModal, scale: 1, duration: 600, ease: 'Back.easeOut' });
                    AudioSynth.play(1000, 'sine', 0.6);
                });
            }
        }

        function saveSnapshot() {
            HISTORY.push({
                c: [...CURRENT_COUNTS],
                w: WOODS.map(s => ({ x: s.x, y: s.y, a: s.angle, s: s.isStatic() })),
                b: BOLTS.map(b => ({ v: b.crys.visible }))
            });
        }
    </script>
</body>

</html>
