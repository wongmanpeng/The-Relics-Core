<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文明遗迹：觉醒的守护者</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #030803;
            overflow: hidden;
            touch-action: none;
            font-family: 'serif';
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <script>
        // 全局状态
        let HISTORY = [];
        let CURRENT_COUNTS = [0, 0, 0, 0];
        let WOODS = [];
        let BOLTS = [];
        // 更深邃、更具能量感的图2色调：青、绿、橙、深紫
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];
        // 玛雅刻痕符文 (用于石碗装饰)
        const RUNES = ['ᚠ', 'ᚢ', 'ᚦ', 'ᚨ'];

        // 音效系统 (由于浏览器限制，需点击一次屏幕后生效)
        const AudioSynth = {
            ctx: null,
            playHit() { try { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'triangle'; o.frequency.setValueAtTime(150, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.2); g.gain.setValueAtTime(0.3, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.2); } catch (e) { } },
            playCollect() { try { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(800, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.1); g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.1); } catch (e) { } }
        };

        const config = {
            type: Phaser.AUTO,
            width: 750,
            height: 1334,
            backgroundColor: '#030803',
            parent: 'game-container',
            physics: { default: 'matter', matter: { gravity: { y: 2.8 }, debug: false } },
            scene: { preload, create },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // 这里是单文件运行，我们继续用绘图生成高级纹理
        }

        function create() {
            const { width, height } = this.scale;
            const scene = this;

            // --- 纹理生成区 ---
            const g = this.make.graphics({ x: 0, y: 0, add: false });

            // 1. 风化、青苔玛雅石板纹理
            g.fillStyle(0x3d3d3d).fillRect(0, 0, 500, 80);
            g.lineStyle(6, 0x1a1a1a).strokeRect(3, 3, 494, 74);
            g.fillStyle(0x0a1a0a, 0.4).fillRect(10, 60, 480, 15); // 青苔细节线条
            g.fillStyle(0xffffff, 0.05).fillRect(10, 10, 480, 10); // 风化线条
            g.generateTexture('stone_brick', 500, 80);
            g.clear();

            // 2. 神秘石碗纹理 (浮雕边框)
            g.fillStyle(0x2c2c2c).fillRect(0, 0, 130, 130);
            g.lineStyle(6, 0x111111).strokeRect(3, 3, 124, 124);
            g.lineStyle(2, 0xd4af37, 0.5).strokeCircle(65, 65, 55); // 金色浮雕纹样
            g.fillStyle(0x0a1a0a, 0.4).fillRect(10, 100, 110, 10); // 青苔
            g.generateTexture('stone_bowl', 130, 130);
            g.clear();

            // 3. 核心漩纹纹理
            g.lineStyle(4, 0x00d2ff, 0.3).strokeCircle(100, 100, 100);
            g.lineStyle(2, 0x00ff87, 0.2).strokeCircle(100, 100, 80);
            g.fillStyle(0x000, 0.5).fillCircle(100, 100, 50);
            g.generateTexture('vortex', 200, 200);
            g.clear();

            // 4. 底部石质齿轮
            g.fillStyle(0x111111).fillRect(0, 0, 100, 10);
            for (let i = 0; i < 5; i++) { g.fillCircle(10 + i * 20, 5, 5); }
            g.generateTexture('stone_gear', 100, 10);
            g.clear();

            // 背景环境
            this.add.graphics().fillGradientStyle(0x0a1a0a, 0x0a1a0a, 0x000, 0x000, 1).fillRect(0, 0, width, height);

            // 背景远景石柱影子与青苔线条
            this.add.graphics().fillStyle(0x000000, 0.4).fillRect(0, 0, 120, height);
            this.add.graphics().fillStyle(0x000000, 0.4).fillRect(width - 120, 0, 120, height);

            // --- 顶部 UI：玛雅仪式石碗 ---
            this.bowlContainers = [];
            this.texts = [];
            COLORS.forEach((color, i) => {
                const x = 120 + i * 170;
                const container = this.add.container(x, 150);

                // 罐子底纹能量光晕
                const glow = this.add.circle(0, 0, 60, color, 0.15).setDepth(0);
                this.tweens.add({ targets: glow, alpha: 0.05, scale: 1.1, duration: 1500, yoyo: true, repeat: -1 });

                // 石碗 Sprite
                const bowl = this.add.sprite(0, 0, 'stone_bowl').setDepth(1);

                // 金色玛雅符文刻痕
                const rune = this.add.text(0, 40, RUNES[i], { fontSize: '28px', color: '#d4af37', fontStyle: 'bold', alpha: 0.6 }).setOrigin(0.5).setDepth(2);

                // 清晰、大号、带描边的数字
                const t = this.add.text(0, -10, '0', { fontSize: '70px', color: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5).setDepth(3);

                container.add([glow, bowl, rune, t]);
                this.bowlContainers.push(container);
                this.texts.push(t);
            });

            // --- 核心特效：旋转魔法漩涡 ---
            const vortex = this.add.sprite(width / 2, height / 2 + 50, 'vortex').setDepth(5).setAlpha(0.6);
            this.tweens.add({ targets: vortex, rotation: Math.PI * 2, duration: 10000, repeat: -1 });

            // --- 关卡布局 ---
            const layout = [
                { x: 230, y: 550, angle: -35, w: 320, c: 0 },
                { x: 520, y: 550, angle: 35, w: 320, c: 0 },
                { x: 375, y: 780, angle: 0, w: 520, c: 2 },
                { x: 180, y: 1050, angle: 90, w: 380, c: 1 },
                { x: 570, y: 1050, angle: 90, w: 380, c: 3 }
            ];

            layout.forEach((data, i) => {
                // 玛雅石板物理对象
                let stone = this.matter.add.sprite(data.x, data.y, 'stone_brick');
                stone.setDisplaySize(data.w, 80);
                stone.setStatic(true);
                stone.setAngle(data.angle);
                stone.setFriction(0.1);
                WOODS.push(stone);

                // 风化刻痕文字 (石板上)
                let runeStr = "◈ ━━ ◈".repeat(Math.round(data.w / 150));
                this.add.text(data.x, data.y, runeStr, { fontSize: '20px', color: '#1a1a1a', alpha: 0.8 }).setOrigin(0.5).setRotation(Phaser.Math.DegToRad(data.angle)).setDepth(9);

                // 水晶螺栓 (增加发光深度与核心符号)
                let glow = this.add.circle(data.x, data.y, 70, COLORS[data.c], 0.25);
                let bolt = this.add.circle(data.x, data.y, 48, COLORS[data.c]).setInteractive().setDepth(10).setStrokeStyle(5, 0xffffff);
                this.tweens.add({ targets: [bolt, glow], scale: 1.1, duration: 800 + i * 150, yoyo: true, repeat: -1 });

                bolt.on('pointerdown', () => {
                    saveSnapshot();
                    AudioSynth.playCollect();

                    bolt.setVisible(false).disableInteractive();
                    glow.setVisible(false);
                    scene.cameras.main.shake(100, 0.01);

                    // 罐子（石碗）效果
                    scene.tweens.add({ targets: this.bowlContainers[data.c], scale: 1.25, duration: 100, yoyo: true, ease: 'Back.easeOut' });
                    // 爆亮符文特效
                    const runeText = this.bowlContainers[data.c].getAt(2);
                    runeText.setAlpha(1);
                    scene.tweens.add({ targets: runeText, alpha: 0.6, duration: 500 });

                    CURRENT_COUNTS[data.c]++;
                    if (CURRENT_COUNTS[data.c] >= 3) CURRENT_COUNTS[data.c] = 0;
                    this.texts[data.c].setText(CURRENT_COUNTS[data.c]);

                    stone.setStatic(false);
                });

                BOLTS.push({ obj: bolt, glow, cIdx: data.c });
            });

            // --- 底部：青苔石刻底座 ---
            this.add.graphics().fillGradientStyle(0x000, 0x000, 0x0a1a0a, 0x0a1a0a, 0.4).fillRect(0, height - 300, width, 300);
            this.add.graphics().lineStyle(4, 0x1a1a1a).strokeRect(100, height - 280, width - 200, 200);

            // 撤回按钮 (金色沙漏图标, 石刻底座上)
            const undoBtn = this.add.container(width / 2, height - 160);
            const uCircle = this.add.circle(0, 0, 95, 0xd4af37, 0.15).setStrokeStyle(6, 0xd4af37).setInteractive();
            const uText = this.add.text(0, 0, '撤回 UNDO', { fontSize: '38px', color: '#d4af37', fontStyle: 'bold' }).setOrigin(0.5);
            const gears = this.add.tileSprite(0, 60, 200, 10, 'stone_gear');
            undoBtn.add([uCircle, uText, gears]);

            uCircle.on('pointerdown', () => { doUndo(this); uCircle.setScale(0.85); SFX.play(400, 'sine', 0.05); });
            uCircle.on('pointerup', () => uCircle.setScale(1));
        }

        function saveSnapshot() { HISTORY.push({ c: [...CURRENT_COUNTS], w: WOODS.map(item => ({ x: item.x, y: item.y, a: item.angle, s: item.isStatic() })), b: BOLTS.map(item => ({ v: item.obj.visible, i: (item.obj.input && item.obj.input.enabled) })) }); }

        function doUndo(scene) { if (HISTORY.length === 0) return; const last = HISTORY.pop(); CURRENT_COUNTS = [...last.c]; CURRENT_COUNTS.forEach((n, i) => scene.texts[i].setText(n)); last.b.forEach((data, i) => { BOLTS[i].obj.setVisible(data.v); BOLTS[i].glow.setVisible(data.v); if (data.i) BOLTS[i].obj.setInteractive(); else BOLTS[i].obj.disableInteractive(); }); last.w.forEach((data, i) => { const stone = WOODS[i]; stone.setStatic(true); stone.setPosition(data.x, data.y); stone.setAngle(data.a); stone.setVelocity(0, 0); stone.setAngularVelocity(0); stone.setStatic(data.s); }); }

        function update() { WOODS.forEach(w => { w.sprite.x = w.x; w.sprite.y = w.y; w.sprite.rotation = w.rotation; }); }
    </script>
</body>

</html>
