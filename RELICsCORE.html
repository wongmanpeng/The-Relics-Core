<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遗迹核心 3D - 物理重力版</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 10%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            pointer-events: none;
        }

        .bowl {
            text-align: center;
            font-family: sans-serif;
        }

        .count {
            font-size: 48px;
            font-weight: bold;
            color: white;
            display: block;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        #win-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 20, 0, 0.9);
            border: 4px solid #d4af37;
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            z-index: 100;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="bowl"><span id="c0" class="count" style="color:#00f8df">0</span></div>
        <div class="bowl"><span id="c1" class="count" style="color:#00ff87">0</span></div>
        <div class="bowl"><span id="c2" class="count" style="color:#fca100">0</span></div>
        <div class="bowl"><span id="c3" class="count" style="color:#b800ff">0</span></div>
    </div>
    <div id="win-msg">
        <h2 style="color:#d4af37; font-size: 40px;">你成功了！</h2>
        <button onclick="location.reload()"
            style="padding:15px 30px; cursor:pointer; background:#d4af37; border:none; font-weight:bold; border-radius:10px;">再来一局</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        let scene, camera, renderer, world;
        let stones = [], crystals = [];
        let counts = [0, 0, 0, 0];
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];

        // 初始化
        init();
        animate();

        function init() {
            // 1. 3D 场景与相机
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020502);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. 物理世界配置
            world = new CANNON.World();
            world.gravity.set(0, -25, 0); // 极强的重力
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;

            // 3. 环境光
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(10, 10, 10);
            scene.add(light);

            // 4. 构建爱心关卡
            const layout = [
                { x: -3.5, y: 4, z: 0, rot: 0.6, w: 5, c: 0 },
                { x: 3.5, y: 4, z: 0, rot: -0.6, w: 5, c: 0 },
                { x: 0, y: 1, z: 0, rot: 0, w: 8, c: 2 },
                { x: -3, y: -3, z: 0, rot: 1.57, w: 6, c: 1 },
                { x: 3, y: -3, z: 0, rot: 1.57, w: 6, c: 3 }
            ];

            layout.forEach((data, i) => {
                // --- 创建 3D 石条 ---
                const geo = new THREE.BoxGeometry(data.w, 0.8, 1.2);
                const mat = new THREE.MeshPhongMaterial({ color: 0x4a504a });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);

                // --- 创建物理刚体 ---
                const body = new CANNON.Body({
                    mass: 0, // 初始静态
                    type: CANNON.Body.STATIC,
                    allowSleep: true
                });
                body.addShape(new CANNON.Box(new CANNON.Vec3(data.w / 2, 0.4, 0.6)));
                body.position.set(data.x, data.y, data.z);
                body.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 0, 1), data.rot);
                world.addBody(body);
                stones.push({ mesh, body });

                // --- 创建发光水晶 ---
                const crysGeo = new THREE.OctahedronGeometry(0.6);
                const crysMat = new THREE.MeshPhongMaterial({
                    color: COLORS[data.c], emissive: COLORS[data.c], emissiveIntensity: 1
                });
                const crysMesh = new THREE.Mesh(crysGeo, crysMat);
                crysMesh.position.set(data.x, data.y, data.z + 1.2);
                crysMesh.userData = { id: i, colorIdx: data.c };
                scene.add(crysMesh);
                crystals.push(crysMesh);
            });

            // 5. 点击交互
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const hits = raycaster.intersectObjects(crystals);
                if (hits.length > 0 && hits[0].object.visible) {
                    const crystal = hits[0].object;
                    const sIdx = crystal.userData.id;
                    const cIdx = crystal.userData.colorIdx;

                    // 1. 水晶消失
                    crystal.visible = false;

                    // 2. UI 计数
                    counts[cIdx]++;
                    document.getElementById(`c${cIdx}`).innerText = counts[cIdx];

                    // 3. 强制激活物理掉落 (重点修复)
                    const targetBody = stones[sIdx].body;
                    targetBody.type = CANNON.Body.DYNAMIC; // 切换为动态
                    targetBody.mass = 10;                  // 给它重量
                    targetBody.updateMassProperties();     // 刷新物理属性
                    targetBody.wakeUp();                   // 强制唤醒

                    // 给个小推力，防止垂直死锁
                    targetBody.applyImpulse(
                        new CANNON.Vec3(0, -1, 0.5),
                        new CANNON.Vec3(targetBody.position.x + 0.1, targetBody.position.y, targetBody.position.z)
                    );

                    checkWin();
                }
            });
        }

        function checkWin() {
            if (crystals.every(c => !c.visible)) {
                setTimeout(() => {
                    document.getElementById('win-msg').style.transform = 'translate(-50%, -50%) scale(1)';
                }, 1000);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // 步进物理世界
            world.step(1 / 60);

            // 渲染同步
            stones.forEach(s => {
                s.mesh.position.copy(s.body.position);
                s.mesh.quaternion.copy(s.body.quaternion);
            });

            crystals.forEach(c => {
                if (c.visible) {
                    c.rotation.y += 0.04;
                    c.rotation.z += 0.01;
                }
            });

            renderer.render(scene, camera);
        }

        // 屏幕适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
