<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遗迹核心：3D 觉醒</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }

        .stat {
            color: white;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .stat-val {
            font-size: 40px;
            font-weight: bold;
            display: block;
        }

        #undo-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border: 2px solid #d4af37;
            color: #d4af37;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            cursor: pointer;
        }

        #win-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(10, 20, 10, 0.95);
            border: 3px solid #d4af37;
            padding: 40px;
            text-align: center;
            color: white;
            border-radius: 20px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="stat"><span id="val-0" class="stat-val" style="color:#00f8df">0</span></div>
        <div class="stat"><span id="val-1" class="stat-val" style="color:#00ff87">0</span></div>
        <div class="stat"><span id="val-2" class="stat-val" style="color:#fca100">0</span></div>
        <div class="stat"><span id="val-3" class="stat-val" style="color:#b800ff">0</span></div>
    </div>
    <button id="undo-btn">UNDO 撤回</button>
    <div id="win-modal">
        <h1 style="color:#d4af37">能量已觉醒</h1>
        <p>你已成功开启 3D 遗迹核心</p>
        <button onclick="location.reload()"
            style="padding:10px 20px; background:#d4af37; border:none; font-weight:bold;">再玩一次</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        let scene, camera, renderer, world;
        let crystals = [], stones = [], history = [];
        let counts = [0, 0, 0, 0];
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];

        init();
        animate();

        function init() {
            // --- 1. Three.js 场景 ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050a05);
            scene.fog = new THREE.FogExp2(0x050a05, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 灯光
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // --- 2. Cannon.js 物理世界 ---
            world = new CANNON.World();
            world.gravity.set(0, -15, 0);

            // --- 3. 创建关卡 (爱心结构) ---
            const layout = [
                { x: -3, y: 3, z: 0, rot: 0.6, w: 4.5, c: 0 },
                { x: 3, y: 3, z: 0, rot: -0.6, w: 4.5, c: 0 },
                { x: 0, y: 0, z: 0.5, rot: 0, w: 7, c: 2 },
                { x: -2.5, y: -3, z: 0, rot: 1.57, w: 5, c: 1 },
                { x: 2.5, y: -3, z: 0, rot: 1.57, w: 5, c: 3 }
            ];

            layout.forEach((data, i) => {
                // 创建 3D 石条
                const geometry = new THREE.BoxGeometry(data.w, 0.8, 1.2);
                const material = new THREE.MeshPhongMaterial({ color: 0x444d44 });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                const shape = new CANNON.Box(new CANNON.Vec3(data.w / 2, 0.4, 0.6));
                const body = new CANNON.Body({ mass: 0 }); // 初始静止
                body.position.set(data.x, data.y, data.z);
                body.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 0, 1), data.rot);
                world.addBody(body);
                stones.push({ mesh, body, initial: { x: data.x, y: data.y, z: data.z, r: data.rot } });

                // 创建 3D 水晶 (八面体)
                const crysGeo = new THREE.OctahedronGeometry(0.5);
                const crysMat = new THREE.MeshPhongMaterial({
                    color: COLORS[data.c],
                    emissive: COLORS[data.c],
                    emissiveIntensity: 0.5,
                    transparent: true
                });
                const crysMesh = new THREE.Mesh(crysGeo, crysMat);
                crysMesh.position.set(data.x, data.y, data.z + 0.8);
                crysMesh.userData = { id: i, colorIdx: data.c };
                scene.add(crysMesh);
                crystals.push(crysMesh);

                // 水晶点光源
                const pLight = new THREE.PointLight(COLORS[data.c], 1, 3);
                pLight.position.copy(crysMesh.position);
                scene.add(pLight);
                crysMesh.userData.light = pLight;
            });

            // --- 4. 交互逻辑 ---
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.addEventListener('pointerdown', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObjects(crystals);
                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    if (!obj.visible) return;

                    saveState();

                    // 收集逻辑
                    obj.visible = false;
                    obj.userData.light.visible = false;
                    const cIdx = obj.userData.colorIdx;
                    counts[cIdx]++;
                    document.getElementById(`val-${cIdx}`).innerText = counts[cIdx];

                    // 物理掉落
                    stones[obj.userData.id].body.mass = 5;
                    stones[obj.userData.id].body.updateMassProperties();

                    checkWin();
                }
            });

            document.getElementById('undo-btn').addEventListener('click', undo);
        }

        function saveState() {
            history.push({
                counts: [...counts],
                stones: stones.map(s => ({
                    pos: s.body.position.clone(),
                    quat: s.body.quaternion.clone(),
                    mass: s.body.mass
                })),
                crystals: crystals.map(c => c.visible)
            });
        }

        function undo() {
            if (history.length === 0) return;
            const state = history.pop();

            counts = [...state.counts];
            counts.forEach((v, i) => document.getElementById(`val-${i}`).innerText = v);

            state.crystals.forEach((v, i) => {
                crystals[i].visible = v;
                crystals[i].userData.light.visible = v;
            });

            state.stones.forEach((s, i) => {
                stones[i].body.position.copy(s.pos);
                stones[i].body.quaternion.copy(s.quat);
                stones[i].body.mass = s.mass;
                stones[i].body.velocity.set(0, 0, 0);
                stones[i].body.angularVelocity.set(0, 0, 0);
                stones[i].body.updateMassProperties();
            });
        }

        function checkWin() {
            if (crystals.every(c => !c.visible)) {
                setTimeout(() => {
                    document.getElementById('win-modal').style.transform = 'translate(-50%, -50%) scale(1)';
                }, 1500);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1 / 60);

            stones.forEach(s => {
                s.mesh.position.copy(s.body.position);
                s.mesh.quaternion.copy(s.body.quaternion);
            });

            crystals.forEach(c => {
                if (c.visible) c.rotation.y += 0.02; // 水晶自转
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
