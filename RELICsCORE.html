<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文明遗迹：三层心核</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #020502;
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>
        // 对应图2的四色核心
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff]; // 青, 绿, 橙, 紫
        let WOODS = [];
        let CRYSTALS = [];
        let COUNTS = [0, 0, 0, 0];

        const config = {
            type: Phaser.AUTO,
            width: 750,
            height: 1334,
            backgroundColor: '#020502',
            physics: { default: 'matter', matter: { gravity: { y: 3.5 }, debug: false } },
            scene: { create },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const scene = this;

            // --- 纹理绘制 (高质感石材) ---
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x333b33).fillRect(0, 0, 500, 80);
            g.lineStyle(4, 0x111).strokeRect(2, 2, 496, 76);
            g.generateTexture('stone', 500, 80);
            g.clear();
            g.fillStyle(0xffffff).fillCircle(30, 30, 30);
            g.generateTexture('orb', 60, 60);

            // --- 顶部 UI 碗 ---
            this.uiTexts = [];
            COLORS.forEach((color, i) => {
                const x = 125 + i * 165;
                this.add.circle(x, 150, 65, 0x111).setStrokeStyle(3, color, 0.5);
                this.uiTexts[i] = this.add.text(x, 150, '0', { fontSize: '60px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
            });

            // --- 三层爱心布局数据 ---
            // layer: 3 (最底层), 2 (中间), 1 (最表层)
            const layout = [
                // 第一层 (最先点击，遮挡内部)
                { layer: 1, x: 200, y: 550, angle: -40, w: 350, c: 0 },
                { layer: 1, x: 550, y: 550, angle: 40, w: 350, c: 0 },
                { layer: 1, x: 375, y: 1100, angle: 0, w: 150, c: 1 },

                // 第二层 (中间层)
                { layer: 2, x: 375, y: 750, angle: 0, w: 500, c: 2 },
                { layer: 2, x: 180, y: 850, angle: 90, w: 400, c: 3 },
                { layer: 2, x: 570, y: 850, angle: 90, w: 400, c: 3 },

                // 第三层 (核心心尖，最后点击)
                { layer: 3, x: 375, y: 950, angle: 0, w: 250, c: 2 }
            ];

            // --- 渲染逻辑：根据 Layer 设置深度和可交互性 ---
            layout.sort((a, b) => b.layer - a.layer); // 确保底层先渲染

            layout.forEach((data, i) => {
                // 石条
                const stone = this.matter.add.sprite(data.x, data.y, 'stone');
                stone.setDisplaySize(data.w, 80).setStatic(true).setAngle(data.angle);
                stone.setDepth(10 - data.layer); // 层级越高(1)，深度越靠前
                stone.setTint(0x222 * (4 - data.layer)); // 越深层越暗

                // 水晶
                const crystal = this.add.image(data.x, data.y, 'orb').setTint(COLORS[data.c]);
                crystal.setDepth(20 - data.layer);
                crystal.setScale(1.2);

                // 发光特效
                const glow = this.add.circle(data.x, data.y, 50, COLORS[data.c], 0.3).setDepth(crystal.depth - 1);

                // 核心：分层锁定逻辑
                // 只有当 layer 为 1 时，才开启交互。后面的层级初始禁止点击。
                if (data.layer === 1) {
                    crystal.setInteractive();
                } else {
                    crystal.setAlpha(0.3); // 没解锁的层级变暗
                }

                crystal.on('pointerdown', () => {
                    // 1. 物理掉落
                    stone.setStatic(false);
                    crystal.setVisible(false);
                    glow.setVisible(false);

                    // 2. 计数
                    COUNTS[data.c]++;
                    this.uiTexts[data.c].setText(COUNTS[data.c]);

                    // 3. 唤醒下一层
                    checkAndUnlockLayers(scene, data.layer);

                    // 4. 成功检测
                    if (CRYSTALS.every(c => !c.visible)) showWin(scene);
                });

                CRYSTALS.push({ obj: crystal, layer: data.layer, glow: glow });
                WOODS.push(stone);
            });

            // 撤回按钮
            const undo = this.add.text(width / 2, height - 100, "UNDO 撤回回溯", { fontSize: '32px', color: '#d4af37' }).setOrigin(0.5).setInteractive();
            undo.on('pointerdown', () => { location.reload(); }); // 简单处理
        }

        // 检查并解锁下一层的函数
        function checkAndUnlockLayers(scene, currentLayer) {
            // 如果当前层(例如Layer 1)的水晶全没了，就激活 Layer 2
            const currentLayerRemaining = CRYSTALS.filter(c => c.layer === currentLayer && c.obj.visible);

            if (currentLayerRemaining.length === 0) {
                // 解锁下一层 (Layer + 1)
                CRYSTALS.forEach(c => {
                    if (c.layer === currentLayer + 1) {
                        c.obj.setInteractive();
                        c.obj.setAlpha(1);
                        scene.tweens.add({ targets: c.obj, scale: 1.5, duration: 200, yoyo: true });
                    }
                });
            }
        }

        function showWin(scene) {
            const { width, height } = scene.scale;
            const panel = scene.add.rectangle(width / 2, height / 2, 500, 300, 0x000, 0.9).setDepth(100).setStrokeStyle(4, 0xd4af37);
            scene.add.text(width / 2, height / 2 - 50, "你成功了", { fontSize: '60px', color: '#d4af37' }).setOrigin(0.5).setDepth(101);
            const btn = scene.add.text(width / 2, height / 2 + 60, "再玩一次", { fontSize: '32px', color: '#fff' }).setOrigin(0.5).setDepth(101).setInteractive();
            btn.on('pointerdown', () => location.reload());
        }

    </script>
</body>

</html>
