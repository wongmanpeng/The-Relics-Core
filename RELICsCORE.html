<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遗迹核心 3D - 物理修复版</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 10%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            pointer-events: none;
        }

        .bowl {
            text-align: center;
            font-family: sans-serif;
        }

        .count {
            font-size: 48px;
            font-weight: bold;
            color: white;
            display: block;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        #win-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 20, 0, 0.9);
            border: 4px solid #d4af37;
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.28);
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="bowl"><span id="c0" class="count" style="color:#00f8df">0</span></div>
        <div class="bowl"><span id="c1" class="count" style="color:#00ff87">0</span></div>
        <div class="bowl"><span id="c2" class="count" style="color:#fca100">0</span></div>
        <div class="bowl"><span id="c3" class="count" style="color:#b800ff">0</span></div>
    </div>
    <div id="win-msg">
        <h2 style="color:#d4af37; font-size: 40px;">你成功了！</h2>
        <p>所有能量核心已归位</p>
        <button onclick="location.reload()"
            style="padding:10px 30px; cursor:pointer; background:#d4af37; border:none; font-weight:bold;">重启仪式</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        let scene, camera, renderer, world;
        let stones = [], crystals = [];
        let counts = [0, 0, 0, 0];
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];

        init();
        animate();

        function init() {
            // 1. 渲染器设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020502);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. 强化重力物理世界
            world = new CANNON.World();
            world.gravity.set(0, -20, 0); // 增加重力加速度，让掉落更干脆

            // 3. 灯光
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 10);
            scene.add(pointLight);

            // 4. 创建 3D 关卡
            const layout = [
                { x: -3.2, y: 3.5, z: 0, rot: 0.6, w: 4.8, c: 0 },
                { x: 3.2, y: 3.5, z: 0, rot: -0.6, w: 4.8, c: 0 },
                { x: 0, y: 0.5, z: 0.5, rot: 0, w: 7.5, c: 2 },
                { x: -2.8, y: -3, z: 0, rot: 1.57, w: 5.5, c: 1 },
                { x: 2.8, y: -3, z: 0, rot: 1.57, w: 5.5, c: 3 }
            ];

            layout.forEach((data, i) => {
                // 创建 3D 石柱
                const geo = new THREE.BoxGeometry(data.w, 0.8, 1.5);
                const mat = new THREE.MeshPhongMaterial({ color: 0x3a403a });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);

                const body = new CANNON.Body({ mass: 0 }); // 初始 mass 为 0 表示静止不动
                body.addShape(new CANNON.Box(new CANNON.Vec3(data.w / 2, 0.4, 0.75)));
                body.position.set(data.x, data.y, data.z);
                body.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 0, 1), data.rot);
                world.addBody(body);
                stones.push({ mesh, body });

                // 创建 3D 发光水晶
                const crysGeo = new THREE.OctahedronGeometry(0.6);
                const crysMat = new THREE.MeshPhongMaterial({
                    color: COLORS[data.c], emissive: COLORS[data.c], emissiveIntensity: 0.8
                });
                const crysMesh = new THREE.Mesh(crysGeo, crysMat);
                crysMesh.position.set(data.x, data.y, data.z + 1);
                crysMesh.userData = { id: i, colorIdx: data.c };
                scene.add(crysMesh);
                crystals.push(crysMesh);
            });

            // 5. 交互点击
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const hit = raycaster.intersectObjects(crystals);
                if (hit.length > 0 && hit[0].object.visible) {
                    const obj = hit[0].object;
                    const idx = obj.userData.id;
                    const cIdx = obj.userData.colorIdx;

                    // 水晶消失与计数
                    obj.visible = false;
                    counts[cIdx]++;
                    document.getElementById(`c${cIdx}`).innerText = counts[cIdx];

                    // 物理唤醒：将石柱质量改为 5，使其受重力掉落
                    stones[idx].body.mass = 5;
                    stones[idx].body.updateMassProperties();
                    stones[idx].body.type = CANNON.Body.DYNAMIC;

                    checkWin();
                }
            });
        }

        function checkWin() {
            if (crystals.every(c => !c.visible)) {
                setTimeout(() => {
                    document.getElementById('win-msg').style.transform = 'translate(-50%, -50%) scale(1)';
                }, 1200);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1 / 60);

            // 同步物理位置到 3D 模型
            stones.forEach(s => {
                s.mesh.position.copy(s.body.position);
                s.mesh.quaternion.copy(s.body.quaternion);
            });

            crystals.forEach(c => {
                if (c.visible) c.rotation.y += 0.03; // 水晶自转动画
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
