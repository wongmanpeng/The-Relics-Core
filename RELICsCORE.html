<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文明遗迹：三层心核 - 修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #020502;
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>
        const COLORS = [0x00f8df, 0x00ff87, 0xfca100, 0xb800ff];
        let WOODS = [];
        let CRYSTALS = [];
        let COUNTS = [0, 0, 0, 0];
        let IS_WIN = false;

        const config = {
            type: Phaser.AUTO,
            width: 750,
            height: 1334,
            backgroundColor: '#020502',
            physics: { default: 'matter', matter: { gravity: { y: 3.5 }, debug: false } },
            scene: { create },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        new Phaser.Game(config);

        function create() {
            const { width, height } = this.scale;
            const scene = this;

            // --- 纹理生成 ---
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0x333b33).fillRect(0, 0, 500, 80);
            g.lineStyle(4, 0x111).strokeRect(2, 2, 496, 76);
            g.generateTexture('stone', 500, 80);
            g.clear();
            g.fillStyle(0xffffff).fillCircle(30, 30, 30);
            g.generateTexture('orb', 60, 60);

            // --- 顶部 UI 碗 ---
            this.uiTexts = [];
            COLORS.forEach((color, i) => {
                const x = 125 + i * 165;
                this.add.circle(x, 150, 65, 0x111).setStrokeStyle(3, color, 0.5);
                this.uiTexts[i] = this.add.text(x, 150, '0', { fontSize: '60px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
            });

            // --- 三层嵌套布局 (Layer 1 最外, Layer 3 最深) ---
            const layout = [
                // Layer 1: 最外层 (大梁，先拆)
                { layer: 1, x: 200, y: 550, angle: -40, w: 350, c: 0 },
                { layer: 1, x: 550, y: 550, angle: 40, w: 350, c: 0 },
                { layer: 1, x: 375, y: 1120, angle: 0, w: 180, c: 1 },

                // Layer 2: 中间层 (支撑架)
                { layer: 2, x: 375, y: 780, angle: 0, w: 520, c: 2 },
                { layer: 2, x: 180, y: 920, angle: 90, w: 350, c: 3 },
                { layer: 2, x: 570, y: 920, angle: 90, w: 350, c: 3 },

                // Layer 3: 核心层 (心尖核心)
                { layer: 3, x: 375, y: 950, angle: 0, w: 250, c: 2 }
            ];

            layout.forEach((data, i) => {
                const stone = this.matter.add.sprite(data.x, data.y, 'stone');
                stone.setDisplaySize(data.w, 85).setStatic(true).setAngle(data.angle);
                stone.setDepth(10 - data.layer);
                stone.setTint(data.layer === 1 ? 0xffffff : 0x444444); // 深层初始调暗

                const crystal = this.add.image(data.x, data.y, 'orb').setTint(COLORS[data.c]);
                crystal.setDepth(20 - data.layer);
                crystal.setScale(1.1);

                const glow = this.add.circle(data.x, data.y, 50, COLORS[data.c], 0.3).setDepth(crystal.depth - 1);

                // 初始交互设置
                if (data.layer === 1) {
                    crystal.setInteractive();
                } else {
                    crystal.setAlpha(0.2); // 深层完全变暗且不可点
                }

                crystal.on('pointerdown', () => {
                    if (IS_WIN) return;

                    // 掉落与消失
                    stone.setStatic(false);
                    crystal.setVisible(false);
                    glow.setVisible(false);

                    // 计数
                    COUNTS[data.c]++;
                    this.uiTexts[data.c].setText(COUNTS[data.c]);

                    // 解锁逻辑：取完一层后亮起下一层
                    checkNextLayer(scene, data.layer);

                    // 胜利判定：全场水晶消失才算赢
                    checkGlobalWin(scene);
                });

                CRYSTALS.push({ obj: crystal, layer: data.layer, stone: stone, glow: glow });
                WOODS.push(stone);
            });

            // 成功窗口 (预先隐藏)
            this.winPanel = this.add.container(width / 2, height / 2).setDepth(100).setVisible(false);
            const bg = this.add.rectangle(0, 0, 500, 300, 0x000, 0.95).setStrokeStyle(4, 0xd4af37);
            const txt = this.add.text(0, -40, "仪式完成", { fontSize: '60px', color: '#d4af37' }).setOrigin(0.5);
            const btn = this.add.text(0, 70, "重新开启", { fontSize: '32px', color: '#fff' }).setOrigin(0.5).setInteractive();
            btn.on('pointerdown', () => location.reload());
            this.winPanel.add([bg, txt, btn]);
        }

        function checkNextLayer(scene, currentLayer) {
            // 检查当前这一层是否已经点光了
            const currentActive = CRYSTALS.filter(c => c.layer === currentLayer && c.obj.visible);

            if (currentActive.length === 0) {
                // 这一层点完了，解锁下一层
                CRYSTALS.forEach(c => {
                    if (c.layer === currentLayer + 1) {
                        c.obj.setInteractive();
                        scene.tweens.add({ targets: c.obj, alpha: 1, scale: 1.3, duration: 400, yoyo: true });
                        c.stone.setTint(0xffffff); // 石条变亮
                    }
                });
            }
        }

        function checkGlobalWin(scene) {
            const anyLeft = CRYSTALS.some(c => c.obj.visible);
            if (!anyLeft) {
                IS_WIN = true;
                scene.time.delayedCall(1500, () => {
                    scene.winPanel.setVisible(true).setScale(0);
                    scene.tweens.add({ targets: scene.winPanel, scale: 1, duration: 500, ease: 'Back.easeOut' });
                });
            }
        }
    </script>
</body>

</html>
